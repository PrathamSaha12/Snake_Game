<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saap</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/svg+xml" href="./naag.png" />

</head>
<body>
    <main>
        <section>
            <div class="infos">
                <div class="info">
                    <h3>High Score:</h3>
                    <span class="high-score">0</span>
                </div>
                <div class="info">
                    <h3>Score:</h3>
                    <span class="score">0</span>
                </div>
                <div class="info">
                    <h3>Time:</h3>
                    <span class="time">00-00</span>
                </div>
            </div>

            <div class="board"></div>
        </section>
        <div class="modal">
            <div class="startgame">
                <h3>Press to start Game</h3>
                <button class="btn btn-start">Start Game</button>
            </div>
            <div class="gameover">
                <h3>Game Over</h3>
                <button class="btn btn-restart">Game Over</button>
            </div>
        </div>
    </main>
    <script src="script.js"></script>
    
</body>
</html>
